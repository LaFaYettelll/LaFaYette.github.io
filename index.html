<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaFaYette Space</title>
    <meta name="description" content="Yette的个人静态网页，分享电商、AI及数字化内容。">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 text-slate-50 min-h-screen flex items-center justify-center font-sans selection:bg-emerald-500 selection:text-slate-900">

    <main class="max-w-md w-full mx-4 p-8 rounded-2xl bg-slate-900/80 backdrop-blur-md border border-slate-700 shadow-2xl text-center hover:border-emerald-500 transition-all duration-500 group">
        
        <div class="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-tr from-emerald-400 to-cyan-400 flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:scale-105 transition-transform duration-500">
            <span class="text-3xl" role="img" aria-label="rocket">🚀</span>
        </div>

        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent mb-2">
            Yette Digital Space
        </h1>
        <p class="text-slate-300 text-sm mb-6 font-medium">Toy's 助理为您驱动 · 极致优化版</p>

        <div class="space-y-3 text-left bg-slate-950 p-4 rounded-xl border border-slate-800 mb-6">
            <div class="flex justify-between text-xs">
                <span class="text-slate-400 font-medium">环境状态</span>
                <span class="text-emerald-400 font-mono font-bold">Production Ready</span>
            </div>
            <div class="flex justify-between text-xs">
                <span class="text-slate-400 font-medium">加载速度</span>
                <span class="text-cyan-400 font-mono font-bold">⚡ Blazing Fast</span>
            </div>
        </div>

        <a href="https://github.com" target="_blank" class="block w-full py-3 px-4 rounded-xl bg-gradient-to-r from-emerald-400 to-cyan-400 text-slate-950 font-bold text-sm shadow-lg shadow-cyan-500/20 hover:opacity-90 active:scale-[0.98] transition-all">
            探索我的项目
        </a>
        
    </main>

</body>
</html>
